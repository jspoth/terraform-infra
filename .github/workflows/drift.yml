name: "Terraform Drift Detection"

on:
  schedule:
    - cron: '0 17 * * *' # Runs daily at 10 AM PST
  workflow_dispatch:      # Allows you to run it manually for testing

permissions:
  id-token: write
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        environment: [dev] # Check all your envs
    
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Check for Drift
        id: plan
        run: |
          set +e

          terraform plan -detailed-exitcode -no-color > drift_output.txt
          EXIT_CODE=$?

          set -e

          echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Alert on Drift
        if: steps.plan.outputs.exitcode == '2'
        run: |
          echo "### ⚠️ DRIFT DETECTED in ${{ matrix.environment }}!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Terraform detected infrastructure drift." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Plan Output:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat drift_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Also log to console
          cat drift_output.txt