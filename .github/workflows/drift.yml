name: "Terraform Drift Detection"

on:
  schedule:
    - cron: '0 17 * * *' # Runs daily at 10 AM PST
  workflow_dispatch:      # Allows you to run it manually for testing

permissions:
  id-token: write
  contents: read

jobs:
  drift-check:
    name: "Drift Check: ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev] # Check all your envs
    environment: ${{ matrix.environment }}

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: rm -rf .terraform && terraform init

      - name: Check for Drift
        id: plan
        continue-on-error: true
        run: terraform plan -detailed-exitcode -no-color

      - name: Alert on Drift
        if: steps.plan.outputs.exitcode == '2'
        run: |
          echo "## ⚠️ DRIFT DETECTED in ${{ matrix.environment }}!" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.plan.outputs.stdout }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Extract Plan Summary
        if: steps.plan.outputs.exitcode == '2'
        run: |
          SUMMARY=$(echo "${{ steps.plan.outputs.stdout }}" | grep "Plan:")
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

      - name: Analyze Drift (Filtered)
        if: steps.plan.outputs.exitcode == '2'
        run: |
          OUTPUT="${{ steps.plan.outputs.stdout }}"

          ADDED=$(echo "$OUTPUT" | grep -cE "^\s*\+ [a-zA-Z0-9_]+\.")
          CHANGED=$(echo "$OUTPUT" | grep -cE "^\s*~ [a-zA-Z0-9_]+\.")
          DESTROYED=$(echo "$OUTPUT" | grep -cE "^\s*- [a-zA-Z0-9_]+\.")

          echo "### Resource-Level Breakdown" >> $GITHUB_STEP_SUMMARY
          echo "- ➕ Added: $ADDED" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 Changed: $CHANGED" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Destroyed: $DESTROYED" >> $GITHUB_STEP_SUMMARY