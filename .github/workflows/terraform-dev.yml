name: Terraform
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Important: Let the current one finish so it unlocks properly
on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write # Required for OIDC
  contents: read  # Required for checkout
  pull-requests: write # To post plan comments

jobs:
  validate:
    uses: ./.github/workflows/lint.yml

  deploy:
    needs: validate # Only runs if linting/validation passes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./environments/dev
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::831714862044:role/github-actions-terraform # Replace with your Role ARN
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Plan
        run: terraform init && terraform plan -lock-timeout=3m