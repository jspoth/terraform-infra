name: "Terraform Plan"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Important: Let the current one finish so it unlocks properly
on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for checkout and pushing fmt fixes
  pull-requests: write # To post plan comments

jobs:
  validate:
    uses: ./.github/workflows/lint.yml

  Plan:
    name: "Run TF plan"
    needs: validate # Only runs if linting/validation passes
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ./environments/dev
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Plan
        run: terraform init && terraform plan -lock-timeout=3m

  infracost:
    needs: validate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/infracost.yml
    with:
      working-directory: ./environments/dev
      environment: dev
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}