name: "Reusable Infracost"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      INFRACOST_API_KEY:
        required: true

jobs:
  validate:
    uses: ./.github/workflows/lint.yml

  infracost:
    name: "Infracost Cost Estimate"
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false # Required so infracost can parse the plan JSON

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate plan - general
        working-directory: ./environments/dev/general
        run: |
          terraform init
          terraform plan -lock-timeout=3m -out=tfplan.binary
          terraform show -json tfplan.binary > plan.json
          infracost breakdown --path=plan.json --format=json --out-file=/tmp/infracost-general.json

      - name: Generate plan - datastores
        working-directory: ./environments/dev/datastores
        run: |
          terraform init
          terraform plan -lock-timeout=3m -out=tfplan.binary
          terraform show -json tfplan.binary > plan.json
          infracost breakdown --path=plan.json --format=json --out-file=/tmp/infracost-datastores.json

      - name: Combine cost estimates
        run: |
          infracost output \
            --path /tmp/infracost-general.json \
            --path /tmp/infracost-datastores.json \
            --format json \
            --out-file /tmp/infracost-combined.json

      - name: Post Infracost Comment
        uses: infracost/actions/comment@v1
        with:
          path: /tmp/infracost-combined.json
          behavior: update # Updates existing comment rather than adding a new one
